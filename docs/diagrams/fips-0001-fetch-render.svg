<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">FIPS-0001 fetch and render flow</title>
  <desc id="desc">Flow diagram showing root announcement, missing-block request, block transfer, root verification, merge, and render-cache based display.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#355c7d"/>
    </marker>
    <style>
      .bg { fill: #f7f4ef; }
      .left { fill: #f7e3c7; stroke: #b7791f; stroke-width: 2; rx: 14; }
      .right { fill: #ddebf7; stroke: #4c6f91; stroke-width: 2; rx: 14; }
      .mid { fill: #d9ead7; stroke: #4c7a57; stroke-width: 2; rx: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #2d2d2d; }
      .section { font: 700 20px Arial, sans-serif; fill: #2d2d2d; }
      .body { font: 16px Arial, sans-serif; fill: #2d2d2d; }
      .mono { font: 15px 'SFMono-Regular', Consolas, monospace; fill: #2d2d2d; }
      .arrow { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #5b5b5b; stroke-width: 2; fill: none; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="620"/>
  <text class="title" x="40" y="50">Nearby Root And Block Sync</text>

  <rect class="left" x="60" y="100" width="250" height="210"/>
  <text class="section" x="85" y="135">Sender Phone</text>
  <text class="body" x="85" y="170">- has current feed root</text>
  <text class="body" x="85" y="198">- enumerates root block hashes</text>
  <text class="body" x="85" y="226">- serves requested blocks</text>
  <text class="mono" x="85" y="265">RootAnnounce</text>
  <text class="mono" x="85" y="290">BlockPut</text>

  <rect class="mid" x="365" y="90" width="250" height="230"/>
  <text class="section" x="390" y="125">Wi-Fi Aware Socket</text>
  <text class="body" x="390" y="160">Discovery handshake</text>
  <text class="body" x="390" y="188">Publisher / subscriber setup</text>
  <text class="body" x="390" y="216">TCP over Aware data path</text>
  <text class="body" x="390" y="244">Length-prefixed frames</text>
  <text class="mono" x="390" y="282">RootAnnounce / BlockWant / BlockPut / SyncDone</text>

  <rect class="right" x="670" y="100" width="250" height="210"/>
  <text class="section" x="695" y="135">Receiver Phone</text>
  <text class="body" x="695" y="170">- compares hash list with local store</text>
  <text class="body" x="695" y="198">- asks only for missing blocks</text>
  <text class="body" x="695" y="226">- verifies remote root integrity</text>
  <text class="mono" x="695" y="265">BlockWant</text>
  <text class="mono" x="695" y="290">SyncDone</text>

  <rect class="right" x="670" y="390" width="250" height="150"/>
  <text class="section" x="695" y="425">Post-Verify Merge</text>
  <text class="body" x="695" y="460">- merge remote entries by photo hash</text>
  <text class="body" x="695" y="488">- persist new local_feed_root.txt</text>
  <text class="body" x="695" y="516">- regenerate cache/render for UI</text>

  <rect class="left" x="60" y="390" width="250" height="150"/>
  <text class="section" x="85" y="425">Sender Store</text>
  <text class="mono" x="85" y="460">files/hashtree/blocks</text>
  <text class="mono" x="85" y="488">files/hashtree/roots/local_feed_root.txt</text>

  <path class="arrow" d="M310 175 L365 175"/>
  <path class="arrow" d="M670 235 L615 235"/>
  <path class="arrow" d="M615 265 L670 265"/>
  <path class="arrow" d="M310 490 L670 490"/>
  <path class="dash" d="M795 310 L795 390"/>

  <text class="body" x="322" y="158">announce root + hashes</text>
  <text class="body" x="470" y="228">missing list back</text>
  <text class="body" x="470" y="285">requested blocks forward</text>
  <text class="body" x="430" y="472">verified merge updates receiver feed</text>
</svg>
