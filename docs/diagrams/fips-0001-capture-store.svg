<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">FIPS-0001 capture and store flow</title>
  <desc id="desc">Flow diagram showing camera capture, hashtree ingestion, feed root update, and render cache regeneration.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#355c7d"/>
    </marker>
    <style>
      .bg { fill: #f7f4ef; }
      .box { fill: #fffdf8; stroke: #9a8f7a; stroke-width: 2; rx: 16; }
      .hot { fill: #f7e3c7; stroke: #b7791f; stroke-width: 2; rx: 14; }
      .cool { fill: #ddebf7; stroke: #4c6f91; stroke-width: 2; rx: 14; }
      .green { fill: #d9ead7; stroke: #4c7a57; stroke-width: 2; rx: 14; }
      .title { font: 700 28px Arial, sans-serif; fill: #2d2d2d; }
      .section { font: 700 20px Arial, sans-serif; fill: #2d2d2d; }
      .body { font: 16px Arial, sans-serif; fill: #2d2d2d; }
      .mono { font: 15px 'SFMono-Regular', Consolas, monospace; fill: #2d2d2d; }
      .arrow { stroke: #355c7d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="520"/>
  <text class="title" x="40" y="50">Capture And Persistent Store Flow</text>

  <rect class="hot" x="60" y="110" width="220" height="140"/>
  <text class="section" x="85" y="145">1. Android Camera</text>
  <text class="body" x="85" y="180">Kotlin launches</text>
  <text class="body" x="85" y="206">ACTION_IMAGE_CAPTURE</text>
  <text class="mono" x="85" y="235">cache/capture/*.jpg</text>

  <rect class="green" x="380" y="90" width="240" height="180"/>
  <text class="section" x="405" y="125">2. Rust Ingest</text>
  <text class="body" x="405" y="160">PhotoStore opens temp JPEG</text>
  <text class="body" x="405" y="188">HashTree.put_stream(...)</text>
  <text class="body" x="405" y="216">creates photo CID</text>
  <text class="body" x="405" y="244">and feed directory entry</text>

  <rect class="cool" x="720" y="70" width="210" height="220"/>
  <text class="section" x="745" y="105">3. Durable State</text>
  <text class="mono" x="745" y="145">files/hashtree/blocks</text>
  <text class="mono" x="745" y="175">local_feed_root.txt</text>
  <text class="body" x="745" y="215">Temp capture file removed.</text>
  <text class="body" x="745" y="243">Root now points at photo CID.</text>

  <rect class="box" x="380" y="330" width="240" height="130"/>
  <text class="section" x="405" y="365">4. Feed Render Prep</text>
  <text class="body" x="405" y="398">feed_items() calls</text>
  <text class="body" x="405" y="424">ensure_render_cache(...)</text>

  <rect class="cool" x="720" y="330" width="210" height="130"/>
  <text class="section" x="745" y="365">5. UI Cache File</text>
  <text class="mono" x="745" y="398">cache/render/&lt;cid&gt;.jpg</text>
  <text class="body" x="745" y="426">BitmapFactory.decodeFile(...)</text>

  <path class="arrow" d="M280 180 L380 180"/>
  <path class="arrow" d="M620 180 L720 180"/>
  <path class="arrow" d="M500 270 L500 330"/>
  <path class="arrow" d="M620 395 L720 395"/>

  <text class="body" x="300" y="160">CameraCaptureCompleted</text>
  <text class="body" x="645" y="160">persist blocks + root</text>
  <text class="body" x="520" y="312">list feed</text>
  <text class="body" x="635" y="377">rehydrate bytes</text>
</svg>
